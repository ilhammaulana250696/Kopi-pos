<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Kopi UMKM</title>
<style>
body{font-family:Arial; padding:10px; background:#f5f5f5}
.container{max-width:400px; margin:auto; background:white; padding:15px; border-radius:10px}
h2{text-align:center; color:#4a2c2a}
.menu, .kasir{margin-top:15px}
button{width:100%; padding:12px; margin:5px 0; background:#4a2c2a; color:white; border:none; border-radius:8px; font-size:16px}
input, select{width:100%; padding:8px; margin:5px 0; box-sizing:border-box; border:1px solid #ccc; border-radius:5px}
.item{display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee}
.total{font-size:20px; font-weight:bold; text-align:right; margin-top:10px}
@media print{button{display:none} body{background:white}}
</style>
</head>
<body>
<div class="container">
<h2>POS KEDAI KOPI</h2>

<div class="menu">
<h3>Tambah Menu</h3>
<input id="namaMenu" placeholder="Nama Menu: Es Kopi Susu">
<input id="hargaMenu" type="number" placeholder="Harga: 20000">
<button onclick="tambahMenu()">+ Tambah Menu</button>
</div>

<div class="kasir">
<h3>Kasir</h3>
<select id="pilihMenu"></select>
<input id="qty" type="number" value="1" placeholder="Qty">
<select id="bayar">
<option>Tunai</option>
<option>QRIS</option>
<option>Transfer</option>
</select>
<button onclick="tambahItem()">Tambah ke Struk</button>

<div id="listItem"></div>
<div class="total">Total: Rp <span id="total">0</span></div>

<input id="uangBayar" type="number" placeholder="Uang Bayar">
<div>Kembalian: Rp <span id="kembalian">0</span></div>

<button onclick="printStruk()">Print Struk 58mm</button>
<button onclick="resetKasir()">Reset</button>
</div>
</div>

<script>
let menu = [
{nama:"Es Kopi Susu", harga:7000},
{nama:"Americano", harga:7000},
{nama:"Cappuccino", harga:8000}
{nama:"chesse expreso", harga:8000}
{nama:"kopi jadoel", harga:8000}
{nama:"macha latte", harga:10000}
{nama:"es coklat ", harga:10000}
{nama:"mocha latte", harga:9000}
{nama:"es teh", harga:4000}
];
let keranjang = [];

function loadMenu(){
let sel = document.getElementById('pilihMenu');
sel.innerHTML = '';
menu.forEach((m,i)=>{
sel.innerHTML += `<option value="${i}">${m.nama} - Rp${m.harga}</option>`;
});
}
loadMenu();

function tambahMenu(){
let n = document.getElementById('namaMenu').value;
let h = parseInt(document.getElementById('hargaMenu').value);
if(n && h){menu.push({nama:n, harga:h}); loadMenu(); alert('Menu ditambah!')}
}

function tambahItem(){
let i = document.getElementById('pilihMenu').value;
let q = parseInt(document.getElementById('qty').value);
keranjang.push({nama:menu[i].nama, harga:menu[i].harga, qty:q});
showKeranjang();
}

function showKeranjang(){
let div = document.getElementById('listItem');
let total = 0;
div.innerHTML = '';
keranjang.forEach(item=>{
let sub = item.harga * item.qty;
total += sub;
div.innerHTML += `<div class="item"><span>${item.nama} x${item.qty}</span><span>Rp${sub}</span></div>`;
});
document.getElementById('total').innerText = total;
hitungKembalian();
}

function hitungKembalian(){
let total = parseInt(document.getElementById('total').innerText);
let bayar = parseInt(document.getElementById('uangBayar').value) || 0;
document.getElementById('kembalian').innerText = bayar - total;
}
document.getElementById('uangBayar').oninput = hitungKembalian;

function printStruk(){
window.print();
}

function resetKasir(){
keranjang = [];
showKeranjang();
document.getElementById('uangBayar').value = '';
}
</script>
</body>
</html>
