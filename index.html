`<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Kopi UMKM Lengkap</title>
<style>
body{font-family:Arial; padding:10px; background:#f5f5f5}
.container{max-width:450px; margin:auto; background:white; padding:15px; border-radius:10px}
h2{text-align:center; color:#4a2c2a}
button{width:100%; padding:12px; margin:5px 0; background:#4a2c2a; color:white; border:none; border-radius:8px; font-size:16px}
input, select{width:100%; padding:8px; margin:5px 0; box-sizing:border-box; border:1px solid #ccc; border-radius:5px}
.item{display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee}
.total{font-size:20px; font-weight:bold; text-align:right; margin-top:10px}
.tab{display:flex; gap:5px; margin-bottom:10px}
.tab button{flex:1; font-size:14px; padding:8px}
.tab button.active{background:#8b5a2b}
.hidden{display:none}
.laporan-item{font-size:14px; margin:5px 0}
@media print{button,.tab,.menu,.laporan{display:none} body{background:white}}
</style>
</head>
<body>
<div class="container">
<h2>POS KEDAI KOPI</h2>

<div class="tab">
<button class="active" onclick="showTab('kasir')">Kasir</button>
<button onclick="showTab('menu')">Menu</button>
<button onclick="showTab('laporan')">Laporan</button>
</div>

<!-- TAB KASIR -->
<div id="kasir">
<select id="pilihMenu"></select>
<input id="qty" type="number" value="1" placeholder="Qty">
<select id="bayar">
<option>Tunai</option>
<option>QRIS</option>
<option>Transfer</option>
</select>
<button onclick="tambahItem()">+ Tambah ke Struk</button>

<div id="listItem"></div>
<div class="total">Total: Rp <span id="total">0</span></div>

<input id="uangBayar" type="number" placeholder="Uang Bayar">
<div>Kembalian: Rp <span id="kembalian">0</span></div>

<button onclick="simpanTransaksi()">Simpan & Print Struk</button>
<button onclick="resetKasir()">Reset</button>
</div>

<!-- TAB MENU -->
<div id="menu" class="hidden">
<h3>Tambah Menu Baru</h3>
<input id="namaMenu" placeholder="Nama Menu: Es Kopi Susu">
<input id="hargaMenu" type="number" placeholder="Harga: 20000">
<button onclick="tambahMenu()">Simpan Menu</button>
<div id="listMenu" style="margin-top:15px"></div>
</div>

<!-- TAB LAPORAN -->
<div id="laporan" class="hidden">
<h3>Laporan Hari Ini</h3>
<div class="laporan-item">Omzet: Rp <span id="omzet">0</span></div>
<div class="laporan-item">Total Cup: <span id="totalCup">0</span></div>
<div id="komposisi"></div>
<button onclick="loadLaporan()">Refresh Laporan</button>
</div>

</div>

<script>
let menu = JSON.parse(localStorage.getItem('menu')) || [
{nama:"Es Kopi Susu", harga:20000},
{nama:"Americano", harga:18000},
{nama:"Cappuccino", harga:22000}
];
let keranjang = [];
let transaksi = JSON.parse(localStorage.getItem('transaksi')) || [];

// URL Web Apps Script kamu - ganti ini
const SHEET_URL = 'PASTE_URL_WEBAPP_DI_SINI';

function showTab(tab){
document.querySelectorAll('.tab button').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
document.getElementById('kasir').classList.add('hidden');
document.getElementById('menu').classList.add('hidden');
document.getElementById('laporan').classList.add('hidden');
document.getElementById(tab).classList.remove('hidden');
if(tab=='menu') showListMenu();
if(tab=='laporan') loadLaporan();
}

function loadMenu(){
let sel = document.getElementById('pilihMenu');
sel.innerHTML = '';
menu.forEach((m,i)=>{
sel.innerHTML += `<option value="${i}">${m.nama} - Rp${m.harga.toLocaleString()}</option>`;
});
}
loadMenu();

function tambahMenu(){
let n = document.getElementById('namaMenu').value;
let h = parseInt(document.getElementById('hargaMenu').value);
if(n && h){
menu.push({nama:n, harga:h});
localStorage.setItem('menu', JSON.stringify(menu));
loadMenu(); showListMenu();
alert('Menu tersimpan!');
document.getElementById('namaMenu').value = '';
document.getElementById('hargaMenu').value = '';
}
}

function showListMenu(){
let div = document.getElementById('listMenu');
div.innerHTML = '<h4>Daftar Menu:</h4>';
menu.forEach(m=> div.innerHTML += `<div class="item"><span>${m.nama}</span><span>Rp${m.harga.toLocaleString()}</span></div>`);
}

function tambahItem(){
let i = document.getElementById('pilihMenu').value;
let q = parseInt(document.getElementById('qty').value);
keranjang.push({nama:menu[i].nama, harga:menu[i].harga, qty:q});
showKeranjang();
}

function showKeranjang(){
let div = document.getElementById('listItem');
let total = 0;
div.innerHTML = '';
keranjang.forEach(item=>{
let sub = item.harga * item.qty;
total += sub;
div.innerHTML += `<div class="item"><span>${item.nama} x${item.qty}</span><span>Rp${sub.toLocaleString()}</span></div>`;
});
document.getElementById('total').innerText = total.toLocaleString();
hitungKembalian();
}

function hitungKembalian(){
let total = parseInt(document.getElementById('total').innerText.replace(/\./g,'')) || 0;
let bayar = parseInt(document.getElementById('uangBayar').value) || 0;
document.getElementById('kembalian').innerText = (bayar - total).toLocaleString();
}
document.getElementById('uangBayar').oninput = hitungKembalian;

function simpanTransaksi(){
if(keranjang.length==0){alert('Keranjang kosong!'); return;}
let total = parseInt(document.getElementById('total').innerText.replace(/\./g,''));
let bayar = document.getElementById('bayar').value;

// 1. Simpan ke local
let trx = {waktu:new Date().toLocaleString(), items:keranjang, total:total, bayar:bayar};
transaksi.push(trx);
localStorage.setItem('transaksi', JSON.stringify(transaksi));

// 2. Kirim ke Google Sheets
fetch(SHEET_URL, {
method:'POST',
body:JSON.stringify(trx),
mode:'no-cors'
});

// 3. Print struk
window.print();
resetKasir();
alert('Transaksi tersimpan!');
}

function loadLaporan(){
let hariIni = new Date().toDateString();
let trxHariIni = transaksi.filter(t=> new Date(t.waktu).toDateString()==hariIni);

let omzet = trxHariIni.reduce((a,b)=>a+b.total,0);
let totalCup = trxHariIni.reduce((a,b)=> a + b.items.reduce((x,y)=>x+y.qty,0), 0);

document.getElementById('omzet').innerText = omzet.toLocaleString();
document.getElementById('totalCup').innerText = totalCup;

// Hitung komposisi %
let komposisiData = {};
trxHariIni.forEach(t=>{
t.items.forEach(i=>{
komposisiData[i.nama] = (komposisiData[i.nama]||0) + (i.harga*i.qty);
});
});

let div = document.getElementById('komposisi');
div.innerHTML = '<h4>Komposisi Penjualan:</h4>';
for(let nama in komposisiData){
let persen = ((komposisiData[nama]/omzet)*100).toFixed(1);
div.innerHTML += `<div class="laporan-item">${nama}: ${persen}% - Rp${komposisiData[nama].toLocaleString()}</div>`;
}
}

function resetKasir(){
keranjang = [];
showKeranjang();
document.getElementById('uangBayar').value = '';
}
</script>
</body>
</html>
